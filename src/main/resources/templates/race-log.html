{% extends "base" %}

{% block title %}Log a Race{% endblock %}

{% block content %}
<h2>Log a Race</h2>
<p style="margin-top: -8px; color: #555;">Record your race result and track your progress.</p>

<div class="card">

    {% if error %}
        <p style="color: red; margin-bottom: 16px;">{{ error }}</p>
    {% endif %}

    <form method="post" action="/races/log">

        <label for="eventName">Race Name</label>
        <input
            id="eventName"
            name="eventName"
            type="text"
            placeholder="e.g. Leeds 10K"
            value="{{ eventName }}"
            required
        >

        <label for="eventDate">Race Date</label>
        <input
            id="eventDate"
            name="eventDate"
            type="date"
            value="{{ eventDate }}"
            required
        >

        <label for="location">Location</label>
        <input
            id="location"
            name="location"
            type="text"
            placeholder="e.g. Leeds, UK"
            value="{{ location }}"
        >

        <label for="category">Category</label>
        <input
            id="category"
            name="category"
            type="text"
            placeholder="e.g. 10K, Half Marathon, 5K"
            value="{{ category }}"
        >

        <label for="finishTime">Finish Time</label>
        <input
            id="finishTime"
            name="finishTime"
            type="text"
            placeholder="e.g. 52:34"
            value="{{ finishTime }}"
        >

        <label for="overallRank">Overall Rank</label>
        <input
            id="overallRank"
            name="overallRank"
            type="number"
            placeholder="e.g. 142"
            value="{{ overallRank }}"
        >

        <label for="categoryRank">Category Rank</label>
        <input
            id="categoryRank"
            name="categoryRank"
            type="number"
            placeholder="e.g. 23"
            value="{{ categoryRank }}"
        >

        <label for="certificateUrl">Certificate URL</label>
        <input
            id="certificateUrl"
            name="certificateUrl"
            type="text"
            placeholder="e.g. https://results.example.com/cert/123"
            value="{{ certificateUrl }}"
        >

        <label style="display: flex; align-items: center; gap: 8px; flex-direction: row;">
            <input
                id="isPersonalBest"
                name="isPersonalBest"
                type="checkbox"
                value="true"
                {% if isPersonalBest %}checked{% endif %}
            >
            This was a personal best
        </label>

        <button type="submit">Save Race</button>

    </form>
</div>

<div style="margin-top: 20px;">
    <a class="button" href="/races">Back to Race History</a>
</div>
{% endblock %}
