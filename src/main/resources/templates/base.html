<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Fitness App{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f7f7f7;
            color: #222;
        }

        header {
            background: #1f4f46;
            color: white;
            padding: 16px 24px;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-right: 16px;
            font-size: 14px;
        }

        main {
            max-width: 900px;
            margin: 24px auto;
            padding: 24px;
            background: white;
            border-radius: 10px;
        }

        h2 {
            margin-top: 0;
        }

        .card {
            background: #f2f4f7;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .button, button {
            background: #1f4f46;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .button.secondary {
            background: #6c757d;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }

        label {
            font-weight: bold;
        }

        ul {
            padding-left: 20px;
        }
    </style>
</head>
<body>
<header>
    <h1>Physical Fitness App</h1>
    <nav>
        <a href="/home">Home</a>
        <a href="/log">Log Activity</a>
        <a href="/quick-log">Quick Log</a>
        <a href="/plan">Weekly Plan</a>
        <a href="/progress">Progress</a>
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
