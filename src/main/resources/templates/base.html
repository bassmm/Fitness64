<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Fitness App{% endblock %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f6fa;
        }

        header {
            background-color: #2f3640;
            color: white;
            padding: 16px 24px;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        nav {
            margin-top: 8px;
        }

        nav a {
            color: white;
            margin-right: 16px;
            text-decoration: none;
            font-size: 14px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 24px;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 0;
        }

        h3 {
            margin-bottom: 8px;
        }

        .button {
            display: inline-block;
            background-color: #0984e3;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            margin-top: 8px;
        }

        .button:hover {
            background-color: #74b9ff;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input, select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 6px;
            background-color: #00b894;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background-color: #55efc4;
        }

        footer {
            text-align: center;
            padding: 16px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>

<body>

<header>
    <h1>Fitness Training App</h1>
    <nav>
        <a href="/home">Home</a>
        <a href="/log">Log Activity</a>
        <a href="/quick-log">Quick Log</a>
        <a href="/plan">Weekly Plan</a>
        <a href="/calendar">Calendar</a>
        <a href="/progress">Progress</a>
        <a href="/profile">Profile</a>
    </nav>
</header>

<div class="container">
    {% block content %}{% endblock %}
</div>

<footer>
    <p>© 2026 Fitness App - COMP2850 Project</p>
</footer>

</body>
</html>
