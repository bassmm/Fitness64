{% extends "base" %}

{% block title %}Log Activity{% endblock %}

{% block content %}
<h2>Log Activity</h2>

<div class="card">

    {% if error %}
        <p style="color: red; margin-bottom: 16px;">
            {{ error }}
        </p>
    {% endif %}

    <form method="post" action="/log">

        <label for="type">Activity Type</label>
        <select id="type" name="type" required>
            <option value="">Select an activity</option>
            <option value="Running" {% if selectedType == "Running" %}selected{% endif %}>Running</option>
            <option value="Cycling" {% if selectedType == "Cycling" %}selected{% endif %}>Cycling</option>
            <option value="Gym" {% if selectedType == "Gym" %}selected{% endif %}>Gym</option>
            <option value="Swimming" {% if selectedType == "Swimming" %}selected{% endif %}>Swimming</option>
        </select>

        <label for="activityDate">Date</label>
        <input
            id="activityDate"
            name="activityDate"
            type="date"
            value="{{ activityDate }}"
            required
        >

        <label for="distance">Distance</label>
        <input
            id="distance"
            name="distance"
            type="text"
            placeholder="e.g. 5 km"
            value="{{ distance }}"
        >

        <label for="duration">Duration</label>
        <input
            id="duration"
            name="duration"
            type="text"
            placeholder="e.g. 30 min"
            value="{{ duration }}"
            required
        >

        <label for="notes">Notes</label>
        <input
            id="notes"
            name="notes"
            type="text"
            placeholder="Optional notes"
            value="{{ notes }}"
        >

        <button type="submit">Save Activity</button>

    </form>
</div>
{% endblock %}
