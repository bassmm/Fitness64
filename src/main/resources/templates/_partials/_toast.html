<div
    id="toast-notification"
    class="toast show"
    role="alert"
    aria-live="assertive"
    aria-atomic="true"
    data-bs-delay="5000"
    hx-swap-oob="true"
>
    <div class="toast-header border-0 {{ toast_type == 'error' ? 'bg-danger text-white' : toast_type == 'warning' ? 'bg-warning' : 'bg-success text-white' }}">
        <i aria-hidden="true" class="bi {{ toast_type == 'error' ? 'bi-exclamation-circle' : toast_type == 'warning' ? 'bi-exclamation-triangle' : 'bi-check-circle' }} me-2"></i>
        <strong class="me-auto small">{{ toast_title | default(toast_type == 'error' ? 'Error' : 'Success') }}</strong>
        <button type="button" class="btn-close btn-close-sm {{ toast_type == 'warning' ? '' : 'btn-close-white' }}" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body small">
        {{ toast_message }}
    </div>
</div>
