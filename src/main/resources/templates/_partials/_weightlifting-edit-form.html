{% if error is not empty %}
<div class="alert alert-danger mb-3" role="alert">
    <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
</div>
{% endif %}

<div class="card shadow-soft mb-4">
    <div class="card-body p-5">
        <h3 class="h5 mb-4">Edit Weightlifting Session</h3>

        <form hx-post="/activities/{{ activity.id }}/edit" hx-target="#activity-edit-area" hx-swap="innerHTML">
            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <label for="name" class="form-label">Activity Name</label>
                    <input type="text" id="name" name="name" class="form-control" value="{{ activity.title }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Date</label>
                    <input type="date" class="form-control" value="{{ activity.date }}" disabled>
                </div>
                <div class="col-md-6">
                    <label for="duration" class="form-label">Duration (minutes)</label>
                    <input type="number" id="duration" name="duration" class="form-control" value="{{ activity.duration }}" required>
                </div>
            </div>

            <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
                <h3 class="h6 mb-0">Exercises</h3>
                <button class="btn btn-sm btn-neutral" type="button" id="add-exercise"><i class="bi bi-plus-lg me-2"></i>Add exercise</button>
            </div>

            <div class="vstack gap-3 mb-4" id="exercise-list">
                {% for exercise in activity.exercises %}
                <div class="border rounded-3 p-3 exercise-row">
                    <div class="row g-3 align-items-end">
                        <div class="col-lg-5">
                            <label class="form-label">Exercise name</label>
                            <input class="form-control" name="exerciseName" type="text" value="{{ exercise.exerciseName }}" required>
                        </div>
                        <div class="col-lg-2">
                            <label class="form-label">Sets</label>
                            <input class="form-control" name="sets" type="number" min="1" value="{{ exercise.sets }}" required>
                        </div>
                        <div class="col-lg-2">
                            <label class="form-label">Reps</label>
                            <input class="form-control" name="reps" type="number" min="1" value="{{ exercise.reps }}" required>
                        </div>
                        <div class="col-lg-2">
                            <label class="form-label">Weight (kg)</label>
                            <input class="form-control" name="weight" type="number" min="0" step="0.1" value="{{ exercise.weight | default('') }}">
                        </div>
                        <div class="col-lg-1 d-grid">
                            <button class="btn btn-sm btn-neutral remove-exercise" type="button" title="Remove row"><i class="bi bi-x-lg"></i></button>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>

            <div class="mb-4">
                <label for="notes" class="form-label">Notes</label>
                <textarea id="notes" name="notes" class="form-control" rows="3">{{ activity.notes | default('') }}</textarea>
            </div>

            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check2-circle me-2"></i>Save Changes
                </button>
                <button type="button" class="btn btn-neutral"
                    hx-get="/activities/{{ activity.id }}/view"
                    hx-target="#activity-edit-area"
                    hx-swap="innerHTML">
                    Cancel
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    (function () {
        const list = document.getElementById("exercise-list");
        const addButton = document.getElementById("add-exercise");
        if (!list || !addButton) return;

        const createRow = () => {
            const existingRow = list.querySelector(".exercise-row");
            if (!existingRow) return null;
            const row = existingRow.cloneNode(true);
            row.querySelectorAll("input").forEach((input) => { input.value = ""; });
            return row;
        };

        const wireRemove = (row) => {
            const btn = row.querySelector(".remove-exercise");
            if (!btn) return;
            btn.addEventListener("click", () => {
                if (list.querySelectorAll(".exercise-row").length === 1) {
                    row.querySelectorAll("input").forEach((i) => { i.value = ""; });
                    return;
                }
                row.remove();
            });
        };

        addButton.addEventListener("click", () => {
            const row = createRow();
            if (!row) return;
            wireRemove(row);
            list.appendChild(row);
        });

        list.querySelectorAll(".exercise-row").forEach(wireRemove);
    })();
</script>
