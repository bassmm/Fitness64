<div class="card shadow-soft">
    <div class="card-body p-5">
        {% if error %}
        <div
            class="alert alert-danger d-flex align-items-center gap-2"
            role="alert"
        >
            <i aria-hidden="true" class="bi bi-exclamation-triangle-fill"></i
            ><span>{{ error }}</span>
        </div>
        {% endif %}

        <form
            hx-post="/log/submit"
            hx-target="#log-form-area"
            hx-swap="innerHTML"
            hx-indicator="#submit-spinner"
            class="row g-4"
        >
            <input type="hidden" name="type" value="Weightlifting" />
            <input
                type="hidden"
                name="activityDate"
                value="{{ activityDate }}"
            />

            <div class="col-12">
                <button
                    type="button"
                    hx-get="/log/picker"
                    hx-target="#log-form-area"
                    hx-swap="innerHTML"
                    class="btn btn-sm btn-neutral"
                >
                    <i aria-hidden="true" class="bi bi-arrow-left me-1"></i
                    >Change activity
                </button>
            </div>

            <div class="col-12">
                <p class="h5 mb-3">Log Weightlifting</p>
            </div>

            <div class="col-md-4">
                <label class="form-label" for="name">Activity Name</label>
                <input
                    class="form-control"
                    id="name"
                    name="name"
                    type="text"
                    placeholder="Weightlifting Session"
                    value="{{ name | default('') }}"
                />
            </div>
            <div class="col-md-4">
                <label class="form-label" for="duration"
                    >Duration (minutes)</label
                >
                <input
                    class="form-control"
                    id="duration"
                    name="duration"
                    type="number"
                    min="1"
                    value="{{ duration | default('') }}"
                    required
                />
            </div>
            <div class="col-md-4">
                <label class="form-label" for="notes">Notes</label>
                <input
                    class="form-control"
                    id="notes"
                    name="notes"
                    type="text"
                    placeholder="Optional workout notes"
                    value="{{ notes | default('') }}"
                />
            </div>

            <div class="col-12">
                <div
                    class="d-flex align-items-center justify-content-between gap-3 mb-3"
                >
                    <h3 class="h6 mb-0">Exercises</h3>
                    <button
                        class="btn btn-sm btn-neutral"
                        type="button"
                        id="add-exercise"
                    >
                        <i aria-hidden="true" class="bi bi-plus-lg me-2"></i>Add
                        exercise
                    </button>
                </div>

                <div class="vstack gap-3" id="exercise-list">
                    <div class="border rounded-3 p-3 exercise-row">
                        <div class="row g-3 align-items-end">
                            <div class="col-lg-5">
                                <label class="form-label"
                                    >Exercise name
                                    <input
                                        class="form-control"
                                        name="exerciseName"
                                        type="text"
                                        placeholder="e.g. Bench Press"
                                        required
                                    />
                                </label>
                            </div>
                            <div class="col-lg-2">
                                <label class="form-label"
                                    >Sets
                                    <input
                                        class="form-control"
                                        name="sets"
                                        type="number"
                                        min="1"
                                        required
                                    />
                                </label>
                            </div>
                            <div class="col-lg-2">
                                <label class="form-label"
                                    >Reps
                                    <input
                                        class="form-control"
                                        name="reps"
                                        type="number"
                                        min="1"
                                        required
                                    />
                                </label>
                            </div>
                            <div class="col-lg-2">
                                <label class="form-label"
                                    >Weight (kg)
                                    <input
                                        class="form-control"
                                        name="weight"
                                        type="number"
                                        min="0"
                                        step="0.1"
                                        placeholder="Optional"
                                    />
                                </label>
                            </div>
                            <div class="col-lg-1 d-grid">
                                <button
                                    class="btn btn-sm btn-neutral remove-exercise"
                                    type="button"
                                    aria-label="Remove exercise row"
                                >
                                    <i
                                        aria-hidden="true"
                                        class="bi bi-x-lg"
                                    ></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 d-flex flex-wrap align-items-center gap-3">
                <button class="btn btn-primary" type="submit">
                    <span
                        id="submit-spinner"
                        class="spinner-border spinner-border-sm d-none me-2"
                    ></span>
                    <i aria-hidden="true" class="bi bi-check2-circle me-2"></i
                    >Save Session
                </button>
                <button
                    type="button"
                    hx-get="/log/picker"
                    hx-target="#log-form-area"
                    hx-swap="innerHTML"
                    class="btn btn-neutral"
                >
                    Cancel
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    (function () {
        const list = document.getElementById("exercise-list");
        const addButton = document.getElementById("add-exercise");
        if (!list || !addButton) return;

        const createRow = () => {
            const row = list.querySelector(".exercise-row").cloneNode(true);
            row.querySelectorAll("input").forEach((input) => {
                input.value = "";
            });
            return row;
        };

        const wireRemove = (row) => {
            const btn = row.querySelector(".remove-exercise");
            if (!btn) return;
            btn.addEventListener("click", () => {
                if (list.querySelectorAll(".exercise-row").length === 1) {
                    row.querySelectorAll("input").forEach((i) => {
                        i.value = "";
                    });
                    return;
                }
                row.remove();
            });
        };

        addButton.addEventListener("click", () => {
            const row = createRow();
            wireRemove(row);
            list.appendChild(row);
        });

        list.querySelectorAll(".exercise-row").forEach(wireRemove);
    })();
</script>
