{% if error is not empty %}
<div class="alert alert-danger mb-3" role="alert">
    <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
</div>
{% endif %}

<div class="card shadow-soft mb-4">
    <div class="card-body p-5">
        <h3 class="h5 mb-4">Edit Cardio Activity</h3>

        <form hx-post="/activities/{{ activity.id }}/edit" hx-target="#activity-edit-area" hx-swap="innerHTML">
            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <label for="name" class="form-label">Activity Name</label>
                    <input type="text" id="name" name="name" class="form-control" value="{{ activity.title }}" placeholder="{{ activity.category }} Session">
                </div>
                <div class="col-md-6">
                    <label for="activityType" class="form-label">Activity Type</label>
                    <select id="activityType" name="activityType" class="form-select">
                        {% for type in activity.availableActivityTypes %}
                        <option value="{{ type }}"{% if type == activity.category %} selected{% endif %}>{{ type }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Date</label>
                    <input type="date" class="form-control" value="{{ activity.date }}" disabled>
                </div>
                <div class="col-md-6">
                    <label for="duration" class="form-label">Duration (minutes)</label>
                    <input type="number" id="duration" name="duration" class="form-control" value="{{ activity.duration }}" required>
                </div>
                <div class="col-md-6">
                    <label for="distance" class="form-label">Distance (km)</label>
                    <input type="number" id="distance" name="distance" class="form-control" value="{{ activity.distance | default('') }}" step="0.01">
                </div>
                <div class="col-md-6">
                    <label for="calories" class="form-label">Calories Burned</label>
                    <input type="number" id="calories" name="calories" class="form-control" value="{{ activity.calories | default('') }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Source</label>
                    <input type="text" class="form-control" value="{{ activity.source | default('Manual entry') }}" disabled>
                </div>
                <div class="col-12">
                    <label for="notes" class="form-label">Notes</label>
                    <textarea id="notes" name="notes" class="form-control" rows="3">{{ activity.notes | default('') }}</textarea>
                </div>
            </div>

            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check2-circle me-2"></i>Save Changes
                </button>
                <button type="button" class="btn btn-neutral"
                    hx-get="/activities/{{ activity.id }}/view"
                    hx-target="#activity-edit-area"
                    hx-swap="innerHTML">
                    Cancel
                </button>
            </div>
        </form>
    </div>
</div>
