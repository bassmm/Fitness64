<div class="card shadow-soft">
    <div class="card-body p-5">
        {% if error %}
            <div class="alert alert-danger d-flex align-items-center gap-2" role="alert"><i aria-hidden="true" class="bi bi-exclamation-triangle-fill"></i><span>{{ error }}</span></div>
        {% endif %}

        <form hx-get="/log/form" hx-target="#log-form-area" hx-swap="innerHTML" class="vstack gap-4">
            <div class="row g-3">
                <div class="col-md-6 col-xl-3">
                    <label class="activity-option h-100">
                        <input class="form-check-input" type="radio" name="activityType" value="Running">
                        <span class="stat-icon bg-primary-subtle text-primary"><i aria-hidden="true" class="bi bi-person-walking"></i></span>
                        <span class="fw-semibold">Running</span>
                    </label>
                </div>
                <div class="col-md-6 col-xl-3">
                    <label class="activity-option h-100">
                        <input class="form-check-input" type="radio" name="activityType" value="Cycling">
                        <span class="stat-icon bg-info-subtle text-info"><i aria-hidden="true" class="bi bi-bicycle"></i></span>
                        <span class="fw-semibold">Cycling</span>
                    </label>
                </div>
                <div class="col-md-6 col-xl-3">
                    <label class="activity-option h-100">
                        <input class="form-check-input" type="radio" name="activityType" value="Weightlifting">
                        <span class="stat-icon bg-warning-subtle text-warning"><i aria-hidden="true" class="bi bi-person-arms-up"></i></span>
                        <span class="fw-semibold">Weightlifting</span>
                    </label>
                </div>
                <div class="col-md-6 col-xl-3">
                    <label class="activity-option h-100">
                        <input class="form-check-input" type="radio" name="activityType" value="Swimming">
                        <span class="stat-icon bg-success-subtle text-success"><i aria-hidden="true" class="bi bi-water"></i></span>
                        <span class="fw-semibold">Swimming</span>
                    </label>
                </div>
            </div>

            <div>
                <label class="form-label" for="activityDate">Date</label>
                <input class="form-control" id="activityDate" name="activityDate" type="date" value="{{ activityDate }}" required>
            </div>

            <div class="d-flex flex-wrap gap-3">
                <button class="btn btn-primary" type="submit"><i aria-hidden="true" class="bi bi-arrow-right-circle me-2"></i>Continue</button>
                <a class="btn btn-neutral" href="/home">Back to dashboard</a>
            </div>
        </form>

        <div class="border-top mt-4 pt-4">
            <p class="text-muted text-sm mb-3">Or import a session from a file</p>
            <a class="btn btn-outline-secondary" href="/import">
                <i class="bi bi-upload me-2"></i>Import from device (TCX / GPX / CSV)
            </a>
        </div>
    </div>
</div>
