{% extends "auth-base" %} {% block title %}Login{% endblock %} {% block
page_heading %}Welcome back{% endblock %} {% block page_summary %}Sign in to
continue tracking your training.{% endblock %} {% block content %}
<div class="p-4">
  {% if error %}
  <div class="alert alert-danger d-flex align-items-center gap-2" role="alert">
    <i class="bi bi-exclamation-triangle-fill"></i>
    <span>{{ error }}</span>
  </div>
  {% endif %}

  <form method="post" action="/login" class="vstack gap-3">
    <div>
      <label class="form-label" for="email">Email</label>
      <input
        class="form-control"
        id="email"
        name="email"
        type="email"
        placeholder="you@example.com"
        value="{{ email }}"
        required
      />
    </div>

    <div>
      <label class="form-label" for="password">Password</label>
      <input
        class="form-control"
        id="password"
        name="password"
        type="password"
        placeholder="Enter your password"
        required
      />
    </div>

    <button class="btn btn-primary w-100" type="submit">Login</button>
  </form>

  <p class="text-center text-muted mt-4 mb-0">
    New here?
    <a class="fw-semibold text-primary text-decoration-none" href="/register"
      >Create an account</a
    >
  </p>
</div>
{% endblock %}
