{% extends "base" %}

{% block title %}Replace Session{% endblock %}

{% block content %}
<h2>Replace Session</h2>
<p style="margin-top: -8px; color: #555;">Update the training session for {{ day }}.</p>

<div class="card">
    <p><strong>Day:</strong> {{ day }}</p>
    <p><strong>Current session:</strong> {{ currentSession }}</p>

    {% if error %}
        <p style="color: red; margin-bottom: 16px;">
            {{ error }}
        </p>
    {% endif %}

    <form method="post" action="/plan/replace">
        <input type="hidden" name="day" value="{{ day }}">

        <label for="newSession">Choose a replacement session</label>
        <select id="newSession" name="newSession" required>
            <option value="">Select a session</option>
            <option value="Run 3km">Run 3km</option>
            <option value="Run 5km">Run 5km</option>
            <option value="Gym">Gym</option>
            <option value="Cycling 10km">Cycling 10km</option>
            <option value="Swimming">Swimming</option>
            <option value="Long Run">Long Run</option>
            <option value="Rest">Rest</option>
            <option value="Home Workout">Home Workout</option>
        </select>

        <button type="submit">Save Replacement</button>
    </form>
</div>

<div style="margin-top: 20px;">
    <a class="button" href="/plan">Back to Weekly Plan</a>
</div>
{% endblock %}
